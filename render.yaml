services:
  - type: web
    name: coda-chat-engine-proxy
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CODA_API_TOKEN
        sync: false       # set manually in Render dashboard — never committed to git
      - key: ALLOWED_ORIGINS
        value: "*"        # update to chrome-extension://<id> after first deploy
    healthCheckPath: /health
